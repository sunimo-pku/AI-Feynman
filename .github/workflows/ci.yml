name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  backend:
    name: Backend Pytest
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install backend dependencies
        run: python -m pip install -r requirements.txt

      - name: Run backend tests
        working-directory: main
        env:
          JWT_SECRET_KEY: ci-jwt-secret-key-for-tests-only
        run: python -m pytest tests --tb=short

  flutter:
    name: Flutter Analyze And Test
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install Flutter dependencies
        working-directory: main/mobile
        run: flutter pub get

      - name: Analyze Dart code
        working-directory: main/mobile
        # 与本地一致：warning 视为失败，避免 unused_* 等问题漏到 main 再发邮件
        run: dart analyze --fatal-warnings lib test

      - name: Run Flutter tests
        working-directory: main/mobile
        run: flutter test
