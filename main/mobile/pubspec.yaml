name: ai_feynman
description: 我讲你听 · 初中数学 Android 客户端（Flutter / Dart）
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ^3.7.0

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.2
  shared_preferences: ^2.5.5
  # 第九轮：实时双工讲题闭环
  # - web_socket_channel：与后端 /lecture/live WS 通信
  # - record：跨平台麦克风采集（Android/iOS/macOS/Web 兼容）
  # - permission_handler：Android 麦克风权限申请
  # - audioplayers：播放后端 /tts 返回的 mp3 base64
  # - path_provider：录音临时文件路径（部分平台需要）
  web_socket_channel: ^3.0.1
  record: ^5.1.2
  permission_handler: ^11.3.1
  audioplayers: ^6.1.0
  path_provider: ^2.1.5
  flutter_math_fork: ^0.7.4
  flutter_svg: ^2.3.0
  image_picker: ^1.1.2
  video_player: ^2.11.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  stream_channel: ^2.1.4

flutter:
  uses-material-design: true
  assets:
    - assets/curriculum/pep-junior-math.json
    - assets/questions/pep-junior-math-questions.json
    - assets/questions/diagrams/
    - assets/videos/answers/
    - assets/agents/
    - assets/icons/
